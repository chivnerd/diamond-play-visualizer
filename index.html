
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baseball Defense Trainer - Learn Baseball Situations</title>
    <meta name="description" content="Interactive baseball training app for kids to learn defensive positioning and game situations" />

    <meta property="og:title" content="Baseball Defense Trainer - Learn Baseball Situations" />
    <meta property="og:description" content="Interactive baseball training app for kids to learn defensive positioning and game situations" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary" />

    <!-- SPA redirect: restores the deep-link path stashed by 404.html on GitHub Pages. -->
    <script>
      (function () {
        try {
          var redirect = sessionStorage.getItem('spa-redirect');
          if (redirect) {
            sessionStorage.removeItem('spa-redirect');
            history.replaceState(null, '', redirect);
          }
        } catch (e) {
          // Storage unavailable — fall through and mount the app at the root.
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
